name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest -q

  dogfood:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .
      - name: nightward gates its own example
        run: |
          nightward run example
          nightward approve --all
          nightward run example
          nightward gate
      - name: semantic judge contract (examples/newsroom, key-free personas)
        working-directory: examples/newsroom
        run: |
          # committed baseline must be intact as-is
          nightward run .
          nightward gate
          # simulated LLM drift breaches the exact gate...
          NEWSROOM_REWRITE=1 nightward run .
          if nightward gate; then
            echo "expected a breach without a judge" && exit 1
          fi
          # ...and a judge collapses it to intact, with an audit trail
          NEWSROOM_REWRITE=1 nightward run . --judge persona:lenient
          nightward gate

  # Non-blocking: build the dashboard from clean-room demo data and upload it as
  # a preview artifact. This must NOT gate the PR — view explains, gate blocks.
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .
      - name: Build dashboard preview (synthetic data)
        run: python scripts/build_demo.py preview-site
      - uses: actions/upload-artifact@v4
        with:
          name: nightward-dashboard-preview
          path: preview-site
